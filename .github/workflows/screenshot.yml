name: Screenshot preview

on:
  workflow_dispatch: {}

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend deps
        working-directory: ./workspace/frontend
        run: |
          npm install
          npx playwright install --with-deps

      - name: Start static server
        run: npx http-server workspace -p 8080 &

      - name: Screenshot preview with Playwright
        run: |
          node -e "(async()=>{const {chromium}=require('playwright');const browser=await chromium.launch();const page=await browser.newPage({viewport:{width:1200,height:800}});await page.goto('http://127.0.0.1:8080/tmp_preview.html');await page.screenshot({path:'task_ui_preview.png', fullPage:true});await browser.close();})();"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: task-ui-screenshot
          path: task_ui_preview.png
