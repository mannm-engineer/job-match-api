name: Render preview SVG

on:
  workflow_dispatch: {}
  push:
    branches: [master]
    paths:
      - 'workspace/frontend/**'
      - 'workspace/task_ui_preview.svg'
      - '.github/workflows/screenshot.yml'

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend deps and Playwright
        working-directory: ./workspace/frontend
        run: |
          npm install
          npm install playwright
          npx playwright install --with-deps

      - name: Start frontend
        working-directory: ./workspace/frontend
        run: npm run dev -- --host 0.0.0.0 &

      - name: Wait for frontend
        run: |
          for i in {1..30}; do
            curl -I http://127.0.0.1:5173 && exit 0
            sleep 2
          done
          exit 1

      - name: Screenshot app
        working-directory: ./workspace/frontend
        run: |
          node -e "(async()=>{const {chromium}=require('playwright');const browser=await chromium.launch();const page=await browser.newPage({viewport:{width:1440,height:960}});await page.goto('http://127.0.0.1:5173', {waitUntil:'networkidle'});await page.screenshot({path:'task_ui_preview.png', fullPage:true});await browser.close();})();"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: task-ui-screenshot
          path: workspace/frontend/task_ui_preview.png
