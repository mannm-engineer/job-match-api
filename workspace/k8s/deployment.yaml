apiVersion: apps/v1
kind: Deployment
metadata:
  name: linkedin-scraper-api
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: linkedin-scraper
  template:
    metadata:
      labels:
        app: linkedin-scraper
    spec:
      containers:
        - name: api
          image: linkedin-scraper:latest
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: linkedin-secrets
                  key: database_url
            - name: LINKEDIN_USER
              valueFrom:
                secretKeyRef:
                  name: linkedin-secrets
                  key: linkedin_user
            - name: LINKEDIN_PASS
              valueFrom:
                secretKeyRef:
                  name: linkedin-secrets
                  key: linkedin_pass
            - name: SEARCH_KEYWORD
              value: "software engineer"
            - name: SEARCH_LOCATION
              value: ""
          ports:
            - containerPort: 8000
