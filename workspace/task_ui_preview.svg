<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900">
  <style>
    .bg { fill: #f8fafc }
    .sidebar { fill: #ffffff; stroke:#e6eef8 }
    .card { fill:#ffffff; stroke:#e6eef8; rx:8; ry:8 }
    .title { font: 24px Inter, Arial; fill:#0f172a }
    .muted { font: 14px Inter, Arial; fill:#64748b }
    .card-title { font: 16px Inter, Arial; fill:#0f172a }
    .small { font:12px Inter, Arial; fill:#475569 }
  </style>
  <rect width="100%" height="100%" fill="#f1f5f9" />

  <!-- Sidebar -->
  <rect x="20" y="20" width="260" height="860" class="sidebar" rx="10" ry="10" />
  <text x="50" y="70" class="title">AI Task Hub</text>
  <text x="50" y="110" class="muted">Manage tasks & agents</text>
  <rect x="40" y="150" width="200" height="40" fill="#eef2ff" rx="6" ry="6" />
  <text x="60" y="178" class="small">Tasks</text>
  <text x="50" y="210" class="small">Dashboard</text>
  <text x="50" y="240" class="small">Agents</text>

  <!-- Header -->
  <text x="320" y="60" class="title">Tasks</text>
  <text x="320" y="88" class="muted">Create and manage tasks for your AI agents</text>

  <!-- Left card (create) -->
  <rect x="320" y="110" width="320" height="220" class="card" rx="8" ry="8" />
  <text x="340" y="142" class="card-title">Create task</text>
  <rect x="340" y="160" width="280" height="34" fill="#fff" stroke="#e2e8f0" rx="6" />
  <text x="348" y="184" class="small">Example task title</text>
  <rect x="340" y="200" width="280" height="70" fill="#fff" stroke="#e2e8f0" rx="6" />
  <text x="348" y="240" class="small">Example description</text>
  <rect x="340" y="280" width="100" height="36" fill="#2563eb" rx="6" />
  <text x="360" y="305" class="small" fill="#fff">Create</text>

  <!-- Kanban columns -->
  <g transform="translate(660,110)">
    <rect x="0" y="0" width="680" height="700" fill="none" />

    <!-- Column headers -->
    <text x="10" y="24" class="card-title">To do</text>
    <text x="190" y="24" class="card-title">In progress</text>
    <text x="370" y="24" class="card-title">Blocked</text>
    <text x="550" y="24" class="card-title">Done</text>

    <!-- Sample cards -->
    <rect x="0" y="40" width="160" height="80" class="card" />
    <text x="10" y="66" class="card-title">Example task 1</text>
    <text x="10" y="86" class="small">Short description</text>

    <rect x="180" y="40" width="160" height="80" class="card" />
    <text x="190" y="66" class="card-title">Run scraper</text>
    <text x="190" y="86" class="small">Agent: scraper-a</text>

    <rect x="360" y="40" width="160" height="80" class="card" />
    <text x="370" y="66" class="card-title">Investigate block</text>
    <text x="370" y="86" class="small">Blocked by auth</text>

    <rect x="540" y="40" width="160" height="80" class="card" />
    <text x="550" y="66" class="card-title" style="text-decoration:line-through">Review results</text>
    <text x="550" y="86" class="small">Completed</text>

  </g>
</svg>